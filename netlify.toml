[build]
  command = "npm run build:vercel"
  publish = "dist"

# SPA fallback — solo cuando NO existe un archivo prerenderizado.
# force = false (default) hace que los index.html estáticos tengan prioridad.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Assets con hash → cache inmutable de 1 año
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
